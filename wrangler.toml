name = "linkwise"
main = "build/index.js"
compatibility_date = "2026-06-19"

[build]
command = "cargo install -q worker-build@^0.8 && worker-build --release"

[assets]
binding = "ASSETS"
directory = "./webapp"
not_found_handling = "single-page-application"
run_worker_first = false

[[d1_databases]]
binding = "DB"
database_name = "linkwise-db"
database_id = "replace-with-cloudflare-d1-database-id"
