name = "linkwise"
main = "build/index.js"
compatibility_date = "2026-06-19"
workers_dev = false

[assets]
binding = "ASSETS"
directory = "./webapp"
not_found_handling = "single-page-application"
run_worker_first = false

[observability.logs]
enabled = true
invocation_logs = true

[[d1_databases]]
binding = "DB"
database_name = "linkwise-db"
